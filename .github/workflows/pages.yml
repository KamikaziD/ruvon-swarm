name: Deploy Swarm Studio to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/swarm_studio/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload swarm_studio as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the demo directory as the Pages root
          path: examples/swarm_studio

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
